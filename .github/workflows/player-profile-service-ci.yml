name: Player Profile Service CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: player_profile_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: supersecret_pass_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d player_profile_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Gradle tests
        run: ./gradlew test --no-daemon

  migration-check:
    name: Check Flyway Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: player_profile_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: supersecret_pass_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d player_profile_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Apply and validate Flyway migrations
        run: >
          ./gradlew --no-daemon
          -Dflyway.url=jdbc:postgresql://localhost:5432/player_profile_db
          -Dflyway.user=admin
          -Dflyway.password=supersecret_pass_123
          -Dflyway.locations=filesystem:src/main/resources/db/migration
          flywayMigrate flywayValidate

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - test
      - migration-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: luckyhunterzzz/game-platform-player-profile-service
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
